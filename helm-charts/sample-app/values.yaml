# yaml-language-server: $schema=
# Base values — GitHub Actions automatically updates `image.tag` on every push to main.
# ArgoCD watches this file and syncs the cluster when it changes.

replicaCount: 2

image:
  repository: 022499014268.dkr.ecr.us-east-1.amazonaws.com/sample-app
  tag: "1194ab44d864f3752ffa66ac78183406238fe87b"
  pullPolicy: IfNotPresent

app:
  name: sample-app
  version: "1.0.0"
  environment: dev

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

ingress:
  enabled: true

rollout:
  strategy: canary
  canary:
    steps: []             # dev: no steps = instant promotion (fast feedback)
  blueGreen:
    autoPromotionEnabled: false

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 10
