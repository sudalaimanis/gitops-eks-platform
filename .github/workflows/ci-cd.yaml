# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI/CD — Build, Test, and Deploy via GitOps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:       ap-south-1
  ECR_REPOSITORY:   sample-app

jobs:

  # ── Job 1: Run tests ──────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt pytest

      - name: Run pytest
        run: |
          cd app
          pytest tests/ -v

  # ── Job 2: Build image and push to ECR ───────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test                         # Only runs if tests pass
    if: github.ref == 'refs/heads/main' # Only on main branch, not PRs
    outputs:
      image-tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg DEPLOYED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            ./app

      - name: Push to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  # ── Job 3: Update Helm values.yaml → triggers ArgoCD auto-sync ───────────
  update-helm-values:
    name: Update Helm Image Tag (triggers ArgoCD)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in values.yaml
        run: |
          # Update image.tag — the only thing ArgoCD needs to trigger a redeploy
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" \
            helm-charts/sample-app/values.yaml

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm-charts/sample-app/values.yaml
          git commit -m "chore(gitops): deploy ${{ github.sha }} [skip ci]"
          git push
        # ArgoCD detects this commit and automatically syncs dev + staging
        # Production requires a manual click in the ArgoCD UI
