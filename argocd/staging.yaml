apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-app-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sudalaimanis/gitops-eks-platform.git
    targetRevision: HEAD
    path: helm-charts/sample-app
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml  # staging overrides merged on top
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
